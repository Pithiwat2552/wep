            <center><p><font size="5">ผู้บริหารจังหวัด ผู้บริหารสูงสุดของจังหวัดพะเยา ณ ต้นปี 2569 คือนางสาวอรอาภา โล่ห์วีระ ผู้ว่าราชการจังหวัดพะเยา (คนที่ 30) ซึ่งเข้ารับตำแหน่งในช่วงปลายปี 2568 โดยมีรองผู้ว่าราชการจังหวัดได้แก่ นายสมศักดิ์ แก้วเสนา และมีนายธวัช สุทธวงค์ เป็นนายกองค์การบริหารส่วนจังหวัดพะเยา
            </font></b></center>
